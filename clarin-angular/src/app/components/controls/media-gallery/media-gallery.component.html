<mat-grid-list cols="4" rowHeight="1:1">
  <mat-grid-tile *ngFor="let image of images; let i = index;">
    <mat-grid-tile-header>
      <mat-checkbox
         [checked]="isSelected(image)"
         (change)="toggle(image)">
      </mat-checkbox>
      <span matLine matTooltip="{{ image.title[0] }}">{{ image.title[0] }}</span>
    </mat-grid-tile-header>

    <img class="w-full h-full object-contain cursor-pointer"
         [src]="image.src" alt="{{ image.title[0] }}"
         (click)="preview(i)" />
  </mat-grid-tile>
</mat-grid-list>
